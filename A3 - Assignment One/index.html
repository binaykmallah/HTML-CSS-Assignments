<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>

  <body>
    <main>
      <nav>
        <img class="icon" src="./squid-game-logo-removebg-preview.png" alt="" />
        <div class="nav-center">
          <a href="#">About</a>
          <a href="#">Watch now</a>
          <a href="#">Actors</a>
          <a href="#">Contact</a>
        </div>
        <img class="menu" src="./menu.png" alt="" />
      </nav>

      <section>
        <div class="left-content">
          <img class="left-image" src="./image-removebg-preview.png" alt="" />
          <p>
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang Season

            <i class="ri-facebook-line"></i>

          <h1 class="right-text">squid</h1>
        </div>

      <div class="bottom">

        <div class="bottom-left">
          <i class="ri-play-fill"></i>
          <img src="./bottomImage-left.webp" alt="" />

        </div>


        <div class="bottom-center">

            <i class="ri-play-fill"></i>

        </div>
        <div class="bottom-right">
